name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate i18n JSON files
        run: python -c "import json, pathlib; [json.loads(f.read_text()) for f in pathlib.Path('src/i18n').glob('*.json')]"

      - name: Check version consistency
        run: |
          python -c "
          import re
          v_py = re.search(r'__version__\s*=\s*\"(.+?)\"', open('src/version.py').read()).group(1)
          v_toml = re.search(r'version\s*=\s*\"(.+?)\"', open('pyproject.toml').read()).group(1)
          assert v_py == v_toml, f'Version mismatch: version.py={v_py}, pyproject.toml={v_toml}'
          print(f'Version OK: {v_py}')
          "

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Install dependencies
        run: pip install PySide6 Pillow huggingface_hub python-docx PyMuPDF pytest pytest-cov

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -v --tb=short
